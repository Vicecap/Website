  <script>
function showPanel(name){

  document.querySelectorAll(".panel")
    .forEach(p => p.style.display = "none");

  document.querySelectorAll(".sidebar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("panel-"+name)
    .style.display = "block";

  event.target.classList.add("active");

  // remember last tab
  localStorage.setItem("adminTab", name);
}

// default
const last = localStorage.getItem("adminTab") || "posts";
showPanel(last);
</script>
    
    <script>
function toggleSidebar(){
  const sb = document.getElementById("sidebar");
  sb.classList.toggle("collapsed");

  // remember state
  localStorage.setItem(
    "sidebarCollapsed",
    sb.classList.contains("collapsed")
  );
}

// restore state
if(localStorage.getItem("sidebarCollapsed")==="true"){
  document.getElementById("sidebar")
    .classList.add("collapsed");
}
</script>
 
<script>
let editor;
let darkTheme = true;

document.addEventListener("DOMContentLoaded",()=>{

  editor = CodeMirror.fromTextArea(
    document.getElementById("fileEditor"),
    {
      mode:"htmlmixed",
      lineNumbers:true,
      theme:"material-darker",
      lineWrapping:true
    }
  );

  editor.on("change", updatePreview);
});

function toggleEditorTheme(){
  darkTheme = !darkTheme;
  editor.setOption("theme", darkTheme ? "material-darker" : "default");
}

function formatCode(){
  const formatted = html_beautify(editor.getValue(),{
    indent_size:2
  });
  editor.setValue(formatted);
}

function searchCode(){
  editor.execCommand("find");
}

let previewReady = false;

function updatePreview() {
  const iframe = document.getElementById("livePreview");
  const code = editor.getValue();

  if (!previewReady) {
    iframe.srcdoc = code;
    previewReady = true;
    return;
  }

  const doc = iframe.contentDocument || iframe.contentWindow.document;

  // Update full document without recreating iframe
  doc.open();
  doc.write(code);
  doc.close();
}

</script>
<script>
async function loadMedia(){
  const res = await fetch("/api/media");
  const files = await res.json();

  const select = document.getElementById("mediaSelect");
  select.innerHTML = `<option value="">Select Image</option>`;

  files.forEach(f=>{
    select.innerHTML += `<option value="${f}">${f}</option>`;
  });
}

function showSelectedImage(){
  const file = document.getElementById("mediaSelect").value;
  const preview = document.getElementById("mediaPreview");

  if(!file){
    preview.innerHTML = "";
    return;
  }

  preview.innerHTML = `
    <img src="/uploads/${file}" width="200" style="border-radius:8px;"><br><br>
    <button onclick="navigator.clipboard.writeText('/uploads/${file}')">
      Copy URL
    </button>
    <button onclick="deleteMedia('${file}')">
      Delete
    </button>
  `;
}

async function deleteMedia(file){
  if(!confirm("Delete image?")) return;
  await fetch("/api/media/"+file,{method:"DELETE"});
  loadMedia();
  document.getElementById("mediaPreview").innerHTML="";
}

loadMedia();

async function loadFileList(){
  const res = await fetch("/api/files");
  const files = await res.json();

  const select = document.getElementById("fileSelect");
  select.innerHTML = "";

  files.forEach(f=>{
    select.innerHTML += `<option value="${f}">${f}</option>`;
  });
}

async function loadFile(){
  const name = document.getElementById("fileSelect").value;
  const res = await fetch("/api/files/"+name);
  const data = await res.json();
editor.setValue(data.content);
}

async function saveFile(){
  const name = document.getElementById("fileSelect").value;
const content = editor.getValue();

  await fetch("/api/files/"+name,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({content})
  });

  alert("Saved!");
}

async function createFile(){
  const name = document.getElementById("newFileName").value;

  await fetch("/api/files",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name })
  });

  alert("Created!");
  loadFileList();
}

loadFileList();
async function loadAnalytics(){
  const range = document.getElementById("rangeSelect").value;
  const res = await fetch("/api/analytics/range?range="+range);
  const data = await res.json();

  document.getElementById("totalViews").textContent =
    "Total Views: " + data.totalViews;

  const box = document.getElementById("pageViews");
  box.innerHTML = "";

  data.pages.forEach(([url,count])=>{
    box.innerHTML += `
      <div style="padding:6px;border-bottom:1px solid #333">
        ${url} — <b>${count}</b>
      </div>
    `;
  });
}

</script>

<script>
let composeMode=false;

function switchMode(){
  const htmlBox=document.getElementById("htmlEditor");
  const composeBox=document.getElementById("composeEditor");

  if(!composeMode){
    composeBox.innerHTML=htmlBox.value;
    htmlBox.style.display="none";
    composeBox.style.display="block";
  }else{
    htmlBox.value=composeBox.innerHTML;
    htmlBox.style.display="block";
    composeBox.style.display="none";
  }

  composeMode=!composeMode;
}

async function loadPosts() {

  const res = await fetch('/api/admin/posts');
  const posts = await res.json();

  const container = document.getElementById('posts');
  const trashContainer = document.getElementById('trash');

  container.innerHTML = "";
  trashContainer.innerHTML = "";

  for (const p of posts) {

    // -------------------------
    // TRASH POSTS
    // -------------------------
    if (p.deleted) {
      trashContainer.innerHTML += `
        <div class="post">
          <h4>${p.title}</h4>

          <div class="btne-group">
            <button onclick="restorePost('${p.id}')">Restore</button>
            <button onclick="permanentDelete('${p.id}')">Delete Permanently</button>
          </div>
        </div>
      `;
      continue;
    }

    // -------------------------
    // FETCH COMMENT COUNT
    // -------------------------
    let commentsCount = 0;
    try {
      const cRes = await fetch('/api/comments/' + p.slug);
      const comments = await cRes.json();
      commentsCount = comments.length;
    } catch (e) {}

    // -------------------------
    // NORMAL POSTS
    // -------------------------
    container.innerHTML += `
      <div class="post">

        <div class="post-top">

          <img src="${p.image || 'https://via.placeholder.com/80'}"
               style="width:80px;height:80px;object-fit:cover;border-radius:6px;">

          <div class="post-info">

            <h3 style="margin:0;">${p.title}</h3>

            <div style="margin-top:4px;">
              <span style="
                background:${p.status === "published" ? "#22c55e" : "#f59e0b"};
                padding:3px 8px;
                border-radius:4px;
                font-size:12px;
                color:#000;
                font-weight:bold;
              ">
                ${p.status.toUpperCase()}
              </span>
            </div>

            <div class="post-meta">
              👁 ${p.views || 0} views • 💬 ${commentsCount} comments
            </div>

            <small style="color:#aaa;">${p.category}</small>

          </div>
        </div>

        <div class="btn-group">
<button onclick="copyPostUrl('${p.slug}')">Copy URL</button>
          <button onclick="editPost('${p.id}')">Edit</button>
          <button onclick="deletePost('${p.id}')">Delete</button>
          <button onclick="toggleStatus('${p.id}')">
            ${p.status === "published" ? "Unpublish" : "Publish"}
          </button>
        </div>

      </div>
    `;
  }
}


let deleteTargetId = null;

function deletePost(id){
  deleteTargetId = id;
  document.getElementById("deleteModal").style.display = "flex";
}

function closeDeleteModal(){
  deleteTargetId = null;
  document.getElementById("deleteModal").style.display = "none";
}

async function confirmDelete(){
  if(!deleteTargetId) return;

  await fetch('/api/posts/' + deleteTargetId, {
    method:'DELETE'
  });

  closeDeleteModal();
  loadPosts();
}
async function editPost(id) {
  const res = await fetch('/api/posts/' + id);
  const post = await res.json();

  const form = document.getElementById('postForm');

  form.querySelector('[name="title"]').value = post.title;
  form.querySelector('[name="author"]').value = post.author;
  form.querySelector('[name="category"]').value = post.category;
  form.querySelector('[name="content"]').value = post.content;
  form.querySelector('[name="slug"]').value = post.slug;
  form.querySelector('[name="tags"]').value = post.tags || '';

if(post.image){
    let preview = document.getElementById("edit-preview");
    if(preview) preview.remove();   // prevent duplicates

    const img = document.createElement("img");
    img.id = "edit-preview";
    img.src = post.image.startsWith("/") ? post.image : "/" + post.image;
    img.style.width = "120px";
    img.style.marginTop = "10px";
    img.style.borderRadius = "6px";
    form.appendChild(img);
  }

  form.dataset.editId = id;
  form.querySelector('button[type="submit"]').textContent = "Update Post";
}
document.getElementById('postForm').addEventListener('submit', async e => {
  e.preventDefault();
if (composeMode) {
  document.getElementById("htmlEditor").value =
    document.getElementById("composeEditor").innerHTML;
}

const formData = new FormData(e.target);
  const editId = e.target.dataset.editId;

  let res;
  if (editId) {
    // Update post
    res = await fetch('/api/posts/' + editId, { method: 'PUT', body: formData });
  } else {
    // Create new post
    res = await fetch('/api/posts', { method: 'POST', body: formData });
  }

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "Failed to save post");
    return;
  }

const postUrl = "/post/" + data.slug;

alert(editId ? 
  "Post updated successfully!" : 
  "Post published successfully!"
);

const copyBtn = document.createElement("button");
copyBtn.textContent = "Copy Post URL";
copyBtn.style.marginTop = "10px";
copyBtn.onclick = () => {
  navigator.clipboard.writeText(postUrl);
  alert("Copied: " + postUrl);
};

e.target.appendChild(copyBtn);

if(editId){
  // stay in edit mode
  e.target.dataset.editId = editId;
  e.target.querySelector('button[type="submit"]').textContent = "Update Post";
}else{
  // new post
  e.target.reset();
  e.target.dataset.editId = "";
  e.target.querySelector('button[type="submit"]').textContent = "Publish";
}

loadPosts();
});

async function searchFixtures() {
  const q = document.getElementById("searchBox").value.trim();
  if (!q) return;

  try {

    // 1️⃣ Fetch RAW HTML post
const postRes = await fetch(`/api/generate-post?q=${encodeURIComponent(q)}`);
const rawHtml = await postRes.text();

const imageUrl = `/api/fixture-image?team=${encodeURIComponent(q)}`;
    fillEditor(rawHtml, imageUrl);

  } catch (err) {
    console.error(err);
    alert("Post generator failed. You can continue manually.");
  }
}

function fillEditor(rawHtml, imageUrl) {

  const form = document.getElementById("postForm");

  // Try to extract title from first <b>Team Vs Team</b>
  const titleMatch = rawHtml.match(/<b>(.*?)<\/b>/i);
  const title = titleMatch ? titleMatch[1] : "Match Preview";

  form.querySelector('[name="title"]').value = title;
  form.querySelector('[name="slug"]').value =
    title.toLowerCase().replace(/\s+/g,'-');

  // Put FULL html directly (since API already builds it)
  const htmlBox = document.getElementById("htmlEditor");
  htmlBox.value = rawHtml;

  if (composeMode) {
    document.getElementById("composeEditor").innerHTML = rawHtml;
  }

  // Auto attach image
fetch(imageUrl)
  .then(r=>{
    if(!r.ok) throw new Error("Image fetch failed");
    return r.blob();
  })
    .then(blob => {
      const file = new File([blob], "fixture.png", { type: blob.type });
      const dt = new DataTransfer();
      dt.items.add(file);
      form.querySelector('[name="image"]').files = dt.files;
    })
    .catch(() => console.log("Image auto attach failed"));

  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function toggleStatus(id){
  await fetch('/api/posts/'+id,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ toggle:true })
  });
  loadPosts();
}
async function restorePost(id){
  await fetch('/api/posts/'+id,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ restore:true })
  });

  loadPosts();
}

async function permanentDelete(id){

  const ok = confirm("Permanently delete this post?");

  if(!ok) return;

  await fetch('/api/posts/'+id,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ permanent:true })
  });

  loadPosts();
}

loadPosts();
</script>
